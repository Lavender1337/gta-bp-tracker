<html lang="ru">
<head>

    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-header: #000000;
            
            /* Цвета */
            --c-gold: #ffb300;
            --c-green: #00c853; 
            --c-red: #d32f2f;
            --c-blue: #29b6f6;
            --c-orange: #ff7043;
            --c-purple: #ab47bc;
            --c-cyan: #26c6da;
            --c-grey-btn: #2c2c2c;

            --text-main: #ffffff;
            --text-sub: #888888;
            --border: 1px solid #333;
            --nav-height: 70px;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0; padding: 0; 
            padding-bottom: calc(var(--nav-height) + 20px);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- HEADER & UI --- */
        .header { padding: 15px; background: var(--bg-header); font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--c-gold); display: flex; justify-content: space-between; align-items: center; }
        .sticky-search { position: sticky; top: 0; z-index: 100; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); padding: 10px 15px; border-bottom: var(--border); }
        .search-input { width: 100%; background: #252525; border: none; outline: none; padding: 12px; border-radius: 10px; color: white; font-size: 14px; box-sizing: border-box; }

        /* --- BP HERO --- */
        .bp-hero { margin: 15px; padding: 20px; background: linear-gradient(135deg, #1e1e1e 0%, #101010 100%); border: 1px solid #333; border-radius: 16px; display: flex; flex-direction: column; gap: 15px; }
        .bp-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .bp-big-num { font-size: 42px; font-weight: 900; line-height: 1; color: var(--c-gold); text-shadow: 0 0 15px rgba(255, 179, 0, 0.2); }
        .bp-input { background: #333; border: none; color: white; padding: 8px; border-radius: 8px; width: 80px; text-align: center; font-weight: bold; font-size: 16px; }
        .bp-toggles { display: flex; gap: 10px; }
        .toggle-btn { flex: 1; padding: 10px; background: #2a2a2a; border: 1px solid #333; color: #888; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .toggle-btn.active { background: var(--c-gold); color: black; border-color: var(--c-gold); box-shadow: 0 0 10px rgba(255, 179, 0, 0.3); }
        
        /* --- BP LIST --- */
        .category-group { margin-bottom: 2px; }
        .cat-header { background: #1a1a1a; padding: 14px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #252525; cursor: pointer; }
        .cat-title { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; color: #ddd; }
        .cat-arrow { transition: 0.3s; font-size: 10px; color: #666; }
        .category-group.open .cat-arrow { transform: rotate(180deg); color: var(--c-gold); }
        .cat-content { display: none; background: #121212; }
        .category-group.open .cat-content { display: block; animation: slideDown 0.2s ease; }
        @keyframes slideDown { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }
        
        .task-item { padding: 12px 15px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .task-item.completed .task-name { text-decoration: line-through; color: #555; }
        .task-item.twink-done { background: rgba(171, 71, 188, 0.05); }
        .task-left { display: flex; align-items: center; gap: 12px; flex: 1; }
        .task-icon { width: 24px; text-align: center; font-size: 18px; }
        .task-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
        .task-sub { font-size: 10px; color: #666; }
        .task-right { display: flex; align-items: center; gap: 8px; }
        
        .btn-act { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #333; background: transparent; color: #666; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
        .btn-act.twink.active { color: #ab47bc; border-color: #ab47bc; background: rgba(171, 71, 188, 0.1); }
        .btn-act.check.active { background: var(--c-gold); color: black; border-color: var(--c-gold); }

        /* --- TIMERS (GRID CARD STYLE) --- */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .timer-card {
            background: var(--bg-card); border: 1px solid #333; border-radius: 12px; padding: 12px;
            display: flex; flex-direction: column; justify-content: space-between; min-height: 110px;
            position: relative; transition: 0.2s;
        }
        .timer-card.running { border: 1px solid var(--c-gold); box-shadow: 0 0 10px rgba(255, 179, 0, 0.1); }
        .tc-header { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #ddd; font-weight: 600; margin-bottom: 4px; }
        .tc-status { font-size: 10px; color: var(--c-gold); margin-left: 20px; margin-bottom: 5px; display: none; }
        .timer-card.running .tc-status { display: block; }
        .tc-time { font-size: 24px; font-weight: 700; font-family: monospace; color: #666; margin-bottom: 10px; letter-spacing: 1px; }
        .timer-card.running .tc-time { color: var(--c-gold); }
        .tc-footer { display: flex; gap: 8px; }
        .btn-main { flex: 1; border: none; border-radius: 6px; padding: 8px 0; font-size: 13px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-start { background: var(--c-green); color: #000; }
        .btn-stop { background: var(--c-red); color: #fff; border: 1px solid #ff5252; }
        .btn-reset-mini { width: 36px; background: var(--c-grey-btn); border: 1px solid #444; border-radius: 6px; color: #aaa; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }

        /* --- GUIDES --- */
        .guide-nav { display: flex; overflow-x: auto; gap: 8px; padding: 10px 15px; scrollbar-width: none; border-bottom: 1px solid #222; }
        .g-tab { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; background: #1e1e1e; border: 1px solid #333; color: #888; transition: 0.2s; }
        .g-tab.active { background: rgba(255,255,255,0.1); color: white; border-color: #666; }
        
        .table-container { padding: 15px; overflow-x: auto; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 100%; }
        .custom-table th { padding: 10px; text-align: left; font-weight: 700; text-transform: uppercase; font-size: 11px; background: rgba(255,255,255,0.05); color: #aaa; }
        .custom-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #ddd; }
        
        /* Tab Colors */
        .g-tab.active[data-type="fishing"] { border-color: var(--c-blue); color: var(--c-blue); background: rgba(41, 182, 246, 0.1); }
        .g-tab.active[data-type="hunting"] { border-color: var(--c-orange); color: var(--c-orange); background: rgba(255, 112, 67, 0.1); }
        .g-tab.active[data-type="treasures"] { border-color: var(--c-gold); color: var(--c-gold); background: rgba(255, 179, 0, 0.1); }
        .g-tab.active[data-type="garage"] { border-color: var(--c-purple); color: var(--c-purple); background: rgba(171, 71, 188, 0.1); }
        .g-tab.active[data-type="seeds"] { border-color: var(--c-green); color: var(--c-green); background: rgba(0, 200, 83, 0.1); }
        .g-tab.active[data-type="repair"] { border-color: var(--c-red); color: var(--c-red); background: rgba(211, 47, 47, 0.1); }
        
        /* Table Colors */
        .t-fishing td:first-child { color: var(--c-blue); font-weight: bold; }
        .t-hunting td:first-child { color: var(--c-orange); font-weight: bold; }
        .t-treasures td:first-child { color: var(--c-gold); font-weight: bold; }
        .t-garage td:first-child { color: var(--c-purple); font-weight: bold; }
        .t-repair td:first-child { color: var(--c-gold); font-weight: bold; }
        .t-seeds td:first-child { color: var(--c-green); font-weight: bold; }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: var(--nav-height); background: #000; border-top: 1px solid #333; display: flex; justify-content: space-around; padding-top: 10px; z-index: 999; }
        .nav-btn { background: none; border: none; color: #555; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; width: 100%; }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }
        .nav-btn.active { color: var(--c-gold); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    </style>
</head>
<body>

            </div>
        </div>

        <div class="sticky-search">
            <input type="text" class="search-input" id="searchBp" placeholder="🔍 Найти задание..." oninput="renderBP()">
        </div>

        <div id="listBP"></div>
    </div>

    <div id="tab-timers" class="tab-content">

            </div>
        </div>
    </div>

    <div id="tab-guides" class="tab-content">

        <div class="guide-nav">

            <button class="g-tab" data-type="hunting" onclick="setGuide('hunting', this)">🏹 Охота</button>
            <button class="g-tab" data-type="treasures" onclick="setGuide('treasures', this)">💎 Сокровища</button>
            <button class="g-tab" data-type="skills" onclick="setGuide('skills', this)">📊 Навыки</button>
            <button class="g-tab" data-type="seeds" onclick="setGuide('seeds', this)">🌱 Семена</button>
            <button class="g-tab" data-type="garage" onclick="setGuide('garage', this)">🚗 Гаражи</button>
            <button class="g-tab" data-type="repair" onclick="setGuide('repair', this)">🔧 Ремонт</button>
        </div>

        <div id="guideContainer" class="table-container"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="go('bp', this)"><div class="nav-icon">📜</div>BP</button>
        <button class="nav-btn" onclick="go('timers', this)"><div class="nav-icon">⏱</div>Таймеры</button>

// --- LOGIC ---
let BP = { start:0, done:[], doneTwink:[], counters:{}, vip:false, x2:false };
let ACTIVE_TIMERS = {}; 
let CAT_STATE = { easy:true, medium:false, hard:false, pair:false, faction:false };

// Init
function init() {
    // Load data
    const savedBP = localStorage.getItem('gta_bp_final');
    if(savedBP) BP = JSON.parse(savedBP);

    const savedActive = localStorage.getItem('gta_timers_active_final');
    if(savedActive) ACTIVE_TIMERS = JSON.parse(savedActive);

    document.getElementById('startBp').value = BP.start || '';
    document.getElementById('btnVip').classList.toggle('active', BP.vip);
    document.getElementById('btnX2').classList.toggle('active', BP.x2);
    
    renderBP(); updateBP(); renderTimers(); setGuide('fishing', document.querySelector('.g-tab'));
    
    // Timer Tick Loop
    setInterval(tickTimers, 1000);
}

// --- BP FUNCTIONS ---
function toggleVip() { BP.vip = !BP.vip; document.getElementById('btnVip').classList.toggle('active'); saveBP(); updateBP(); renderBP(); }
function toggleX2() { BP.x2 = !BP.x2; document.getElementById('btnX2').classList.toggle('active'); saveBP(); updateBP(); renderBP(); }

function updateBP() {
    BP.start = parseInt(document.getElementById('startBp').value) || 0;
    let total = BP.start;

    // Считаем выполненные
    const processTask = (id) => {
        let task = DB.bp[id];
        let rw = BP.vip ? task.v : task.b;
        if(BP.x2) rw *= 2;
        return rw;
    };

    BP.done.forEach(id => total += processTask(id));
    
    // Счетчики
    Object.keys(BP.counters).forEach(id => {
        let task = DB.bp[id];
        let rw = BP.vip ? task.v : task.b;
        if(BP.x2) rw *= 2;
        total += (rw * BP.counters[id]);
    });

    let farmed = total - BP.start;
    document.getElementById('totalBp').innerText = total;
    document.getElementById('farmedBp').innerText = '+' + farmed;
    saveBP();
}

function renderBP() {
    const list = document.getElementById('listBP');
    const search = document.getElementById('searchBp').value.toLowerCase();
    list.innerHTML = '';

    const CAT_NAMES = { easy:"Легкие", medium:"Средние", hard:"Сложные", pair:"Парные", faction:"Фракционные" };
    const groups = { easy:[], medium:[], hard:[], pair:[], faction:[] };

    DB.bp.forEach((t, i) => {
        if(search && !t.t.toLowerCase().includes(search)) return;
        if(groups[t.cat]) groups[t.cat].push({...t, id:i});
    });

    Object.keys(CAT_NAMES).forEach(key => {
        const tasks = groups[key];
        if(!tasks.length) return;
        
        const isOpen = CAT_STATE[key] || search.length > 0;
        
        let html = `
            <div class="category-group ${isOpen?'open':''}">
                <div class="cat-header" onclick="toggleCat('${key}')">
                    <div class="cat-title"><span class="cat-arrow">▼</span> ${CAT_NAMES[key]}</div>
                    <div class="badge" style="background:#333; color:#888;">${tasks.length}</div>
                </div>
                <div class="cat-content">
        `;
        
        tasks.forEach(t => {
            const i = t.id;
            const done = BP.done.includes(i);
            const twink = BP.doneTwink.includes(i);
            let rw = BP.vip ? t.v : t.b; if(BP.x2) rw *= 2;

            // Счетчик
            let counterHTML = '';
            if(t.q > 1) {
                let curr = BP.counters[i] || 0;
                counterHTML = `<button class="btn-act" style="width:auto; padding:0 8px; font-size:11px;" onclick="updCount(${i}, 1, event)">${curr}/${t.q}</button>`;
            }

            html += `
                <div class="task-item ${done?'completed':''} ${twink?'twink-done':''}" onclick="togTask(${i})">
                    <div class="task-left">
                        <div class="task-icon">${t.i}</div>
                        <div>
                            <div class="task-name">${t.t}</div>
                            <div class="task-sub">Награда: <span style="color:var(--c-gold)">+${rw}</span></div>
                        </div>
                    </div>
                    <div class="task-right">
                        ${counterHTML}
                        <button class="btn-act twink ${twink?'active':''}" onclick="togTwink(${i}, event)">👻</button>
                        <button class="btn-act check ${done?'active':''}">${done?'✔':''}</button>
                    </div>
                </div>
            `;
        });

        html += `</div></div>`;
        list.appendChild(document.createRange().createContextualFragment(html));
    });
}

function toggleCat(k) { CAT_STATE[k] = !CAT_STATE[k]; renderBP(); }
function togTask(i) {
    if(BP.done.includes(i)) BP.done = BP.done.filter(x=>x!==i);
    else { BP.done.push(i); BP.doneTwink = BP.doneTwink.filter(x=>x!==i); }
    saveBP(); updateBP(); renderBP();
}
function togTwink(i, e) {
    e.stopPropagation();
    if(BP.doneTwink.includes(i)) BP.doneTwink = BP.doneTwink.filter(x=>x!==i);
    else { BP.doneTwink.push(i); BP.done = BP.done.filter(x=>x!==i); }
    saveBP(); updateBP(); renderBP();
}
function updCount(i, d, e) {
    e.stopPropagation();
    let max = DB.bp[i].q;
    if(!BP.counters[i]) BP.counters[i] = 0;
    BP.counters[i] += d;
    if(BP.counters[i] > max) BP.counters[i] = 0;
    // Auto complete
    if(BP.counters[i] === max && !BP.done.includes(i)) togTask(i);
    saveBP(); updateBP(); renderBP();
}
function newDay() {
    if(confirm('Сбросить прогресс?')) {
        BP.done=[]; BP.doneTwink=[]; BP.counters={}; BP.start=0;
        saveBP();
        location.reload();
    }
}
function saveBP() { localStorage.setItem('gta_bp_final', JSON.stringify(BP)); }

// --- TIMERS (NEW GRID LOGIC) ---
function renderTimers() {
    const grid = document.getElementById('timerGrid'); 
    grid.innerHTML = '';
    
    DB.timers.forEach(t => {
        const active = ACTIVE_TIMERS[t.id];
        let displayTime = fmt(t.s); // По дефолту время старта (напр 10:00)
        let isRunning = false;

        if (active) {
            const left = Math.ceil((active.end - Date.now()) / 1000);
            if (left > 0) {
                displayTime = fmt(left);
                isRunning = true;
            } else {
                displayTime = "ГОТОВО";
                isRunning = true; 
            }
        }

        grid.innerHTML += `
            <div class="timer-card ${isRunning ? 'running' : ''}" id="card_${t.id}">
                <div>
                    <div class="tc-header">
                        <span>::</span> ${t.i} ${t.l}
                    </div>
                    <div class="tc-status">● Активен</div>
                    <div class="tc-time" id="time_${t.id}">${displayTime}</div>
                </div>
                
                <div class="tc-footer">
                    ${isRunning 
                        ? `<button class="btn-main btn-stop" onclick="stopTimer('${t.id}')">❚❚ Стоп</button>` 
                        : `<button class="btn-main btn-start" onclick="startTimer('${t.id}', ${t.s})">▷ Старт</button>`
                    }
                    <button class="btn-reset-mini" onclick="resetTimer('${t.id}', ${t.s})">↻</button>
                </div>
            </div>`;
    });
}

function startTimer(id, seconds) {
    ACTIVE_TIMERS[id] = { end: Date.now() + (seconds * 1000), total: seconds };
    saveActiveTimers();
    renderTimers();
}
function stopTimer(id) {
    delete ACTIVE_TIMERS[id];
    saveActiveTimers();
    renderTimers();
}
function resetTimer(id, seconds) {
    ACTIVE_TIMERS[id] = { end: Date.now() + (seconds * 1000), total: seconds };
    saveActiveTimers();
    renderTimers();
}
function addCustomTimer() {
    const name = document.getElementById('custTmName').value || 'Таймер';
    const min = parseInt(document.getElementById('custTmMin').value);
    if(min) {
        // Создаем уникальный ID
        const id = 'cust_' + Date.now();
        // Добавляем в базу временно
        DB.timers.push({id: id, l: name, s: min * 60, i: '⏱'});
        startTimer(id, min * 60);
        document.getElementById('custTmName').value = '';
        document.getElementById('custTmMin').value = '';
    }
}
function saveActiveTimers() { localStorage.setItem('gta_timers_active_final', JSON.stringify(ACTIVE_TIMERS)); }

function tickTimers() {
    let hasChanges = false;
    
    DB.timers.forEach(t => {
        const active = ACTIVE_TIMERS[t.id];
        if (active) {
            const left = Math.ceil((active.end - Date.now()) / 1000);
            const el = document.getElementById(`time_${t.id}`);
            
            if (left <= 0) {
                 if(el) el.innerText = "ГОТОВО";
                 if(!active.notified) {
                     active.notified = true;
                     if(window.Telegram.WebApp.showPopup) window.Telegram.WebApp.showPopup({title:'Таймер', message:`${t.l} завершен!`});
                     if(navigator.vibrate) navigator.vibrate([200,100,200]);
                     saveActiveTimers();
                 }
            } else {
                 if(el) el.innerText = fmt(left);
            }
            hasChanges = true;
        }
    });

    let min = Infinity;
    Object.values(ACTIVE_TIMERS).forEach(a => {
        let l = Math.ceil((a.end - Date.now())/1000);
        if(l > 0 && l < min) min = l;
    });
    document.getElementById('headerTimer').innerText = min !== Infinity ? `⏳ ${fmt(min)}` : '';
}

// --- GUIDES ---
function setGuide(type, btn) {
    document.querySelectorAll('.g-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const data = DB.guides[type];
    const container = document.getElementById('guideContainer');
    
    let html = `<table class="custom-table t-${type}"><thead><tr>`;
    data.h.forEach(h => html += `<th>${h}</th>`);
    html += `</tr></thead><tbody>`;
    
    data.d.forEach(row => {
        html += `<tr>`;
        row.forEach(cell => html += `<td>${cell}</td>`);
        html += `</tr>`;
    });
    html += `</tbody></table>`;
    container.innerHTML = html;
}

// --- NAV ---
function go(id, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
    btn.classList.add('active');
}
function fmt(s) {
    let h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if(h>0) return `${pad(h)}:${pad(m)}:${pad(sec)}`;
    return `${pad(m)}:${pad(sec)}`;
}
function pad(n) { return n<10?'0'+n:n; }

// Start
init();
if(window.Telegram.WebApp) {
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
    try { window.Telegram.WebApp.setHeaderColor('#000000'); } catch(e){}
}
</script>
