<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA Helper v23 Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
:root {
    /* --- ТЕМНАЯ ТЕМА (Базовая) --- */
    --bg-deep: #050505;
    --bg-card: #0f0f11;
    --border: #222;
    --text-main: #ffffff;
    --text-sub: rgba(255, 255, 255, 0.55);
    
    --accent: #f97316;
    --accent-glow: rgba(249, 115, 22, 0.4);
    
    --green: #10b981;
    --red: #ef4444;
    --gold: #fbbf24;
    
    /* Элементы управления */
    --input-bg: #111;
    --input-border: #333;
    --input-text: #fff;
    --icon-bg: #1a1a1a; /* Всегда темный для белых иконок */
    --bar-bg: #000;
    --btn-sec-bg: #1a1a1a;
    
    --radius: 12px;
    --nav-height: 85px;
}

/* --- ТЕМА: НЕЖНАЯ БЕЛО-ОРАНЖЕВАЯ --- */
body.theme-white-orange {
    --bg-deep: #F0F2F5;
    --bg-card: #FFFFFF;
    --border: #E0E0E0;
    --text-main: #111111;
    --text-sub: #666666;
    
    --accent: #FF9F0A;
    --accent-glow: rgba(255, 159, 10, 0.25);
    
    --input-bg: #FFFFFF;
    --input-border: #CCCCCC;
    --input-text: #000;
    
    /* Важно: оставляем фон иконок темным, чтобы белые PNG были видны */
    --icon-bg: #2C2C2E; 
    --bar-bg: #F0F2F5;
    --btn-sec-bg: #F0F2F5;
    
    --twink-bg: rgba(175, 82, 222, 0.1);
    --twink-border: rgba(175, 82, 222, 0.2);
    --twink-text: #af52de;
}

/* --- ТЕМА: ЧЕРНО-ЛИЛОВАЯ --- */
body.theme-black-purple {
    --bg-deep: #050505; --bg-card: #121016; --border: #2a2036;
    --accent: #c084fc; --accent-glow: rgba(192, 132, 252, 0.4);
    --twink-text: #c084fc;
}

/* --- ТЕМА: ЧЕРНО-КРАСНАЯ --- */
body.theme-black-red {
    --bg-deep: #080202; --bg-card: #140a0a; --border: #361010;
    --accent: #ef4444; --accent-glow: rgba(239, 68, 68, 0.4);
    --twink-text: #c084fc;
}

/* --- ТЕМА: НЕЖНАЯ БЕЛО-ФИОЛЕТОВАЯ --- */
body.theme-white-purple {
    --bg-deep: #F8F7FF;
    --bg-card: #FFFFFF;
    --border: #E5D5F5;
    --text-main: #2E1A47;
    --text-sub: #7D7D8E;
    
    --accent: #9333ea;
    --accent-glow: rgba(147, 51, 234, 0.2);
    
    --input-bg: #FFFFFF;
    --input-border: #D8B4FE;
    --input-text: #1f2937;
    
    --icon-bg: #2E1A47; /* Темно-фиолетовый фон для иконок */
    --bar-bg: #F3F0FF;
    --btn-sec-bg: #F3F0FF;

    --twink-bg: rgba(239, 68, 68, 0.1);
    --twink-border: rgba(239, 68, 68, 0.2);
    --twink-text: #ef4444;
}

/* --- ОСНОВНЫЕ СТИЛИ --- */
body {
    background-color: var(--bg-deep);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
    margin: 0; padding: 0; padding-bottom: calc(var(--nav-height) + 40px);
    overflow-x: hidden; font-size: 14px; min-height: 100vh;
    transition: background-color 0.3s, color 0.3s;
}

/* Inputs */
input, select, textarea {
    background: var(--input-bg) !important;
    border: 1px solid var(--input-border) !important;
    color: var(--input-text) !important;
    padding: 10px 12px; border-radius: 10px; font-size: 14px; outline: none; transition: 0.2s;
    font-family: inherit; -webkit-appearance: none; appearance: none;
}
input:focus, select:focus { border-color: var(--accent) !important; }

/* Cards & Items */
.task-item, .card, .bp-hero, .timer-card, .cal-grid {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
}

/* Icons Container - ВСЕГДА ТЕМНЫЙ ФОН ВНУТРИ */
.bp-icon-container {
    width: 42px; height: 42px;
    background: var(--icon-bg); 
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.bp-img { width: 32px; height: 32px; object-fit: contain; }
.card-icon { font-size: 24px; width: 40px; text-align: center; background: var(--icon-bg); border-radius: 8px; padding: 4px; border: 1px solid rgba(255,255,255,0.1); color: #fff; }

/* Controls */
.controls-new {
    background: var(--bar-bg);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; padding: 4px; border-radius: 10px;
}
.btn-mini {
    width: 32px; height: 32px; border-radius: 8px; border: none; font-size: 18px; font-weight: bold;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.btn-mini.minus { background: transparent; color: var(--text-sub); }
.btn-mini.plus { background: var(--accent); color: #000; box-shadow: 0 2px 8px var(--accent-glow); }
.counter-val-new { min-width: 20px; text-align: center; font-size: 14px; font-weight: 800; color: var(--text-main); }

/* Buttons */
.hero-btn, .seg-btn {
    background: var(--btn-sec-bg);
    border: 1px solid var(--border);
    color: var(--text-sub);
    font-weight: 600; border-radius: 10px;
    transition: 0.2s;
}
.hero-btn.active, .seg-btn.active {
    background: var(--accent);
    color: #fff; border-color: var(--accent);
    box-shadow: 0 4px 12px var(--accent-glow);
}

/* Progress */
.progress-track { height: 6px; background: var(--bar-bg); border-radius: 3px; width: 100%; margin-top: 8px; overflow: hidden; border: 1px solid var(--border); }
.progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s; }

/* Inline Timer Box */
.inline-timer-box {
    display: flex; align-items: center; gap: 4px; 
    background: #111; /* Всегда темный для контраста цифр */
    padding: 3px 8px; border-radius: 6px; border: 1px solid #333; height: 24px;
}
.it-val { font-size: 11px; font-family: monospace; color: #fff; min-width: 40px; text-align: center; font-weight: bold; }

/* Timers Tab */
.timer-card.running { border-color: var(--gold); background: rgba(251, 191, 36, 0.05); }
.tc-time { font-size: 28px; font-weight: 800; font-family: monospace; color: var(--text-main); margin: 5px 0; }
.timer-progress-bg { position: absolute; bottom: 0; left: 0; height: 4px; width: 100%; background: rgba(128,128,128,0.1); border-radius: 0 0 12px 12px; overflow: hidden; }
.timer-progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 1s linear; }

/* Header Widget */
.sticky-search {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-deep); /* Фон хедера под цвет темы */
    padding: 10px 15px; border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
}
.mini-stats-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.stat-side { flex: 0 0 70px; font-size: 10px; color: var(--text-sub); text-align: center; }
.mini-stat-val { font-size: 14px; font-weight: 800; display: block; margin-top: 2px; }

.header-timer-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--input-bg);
    padding: 4px; border-radius: 20px; border: 1px solid var(--border);
    position: relative; overflow: hidden; height: 32px; margin: 0 8px;
}
.ht-progress-bg { position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: rgba(128,128,128,0.2); }
.ht-progress-bar { height: 100%; background: var(--green); width: 0%; transition: width 1s linear; }
.ht-btn { background: none; border: none; color: var(--text-sub); font-size: 10px; cursor: pointer; padding: 0 8px; z-index: 2; height: 100%; display: flex; align-items: center; }
.ht-content { text-align: center; width: 100%; z-index: 2; overflow: hidden; }
.ht-label { font-size: 9px; color: var(--text-main); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ht-time { font-size: 13px; font-weight: bold; color: var(--text-main); font-family: monospace; }

/* Grids */
.hero-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
.stat-val { font-size: 20px; font-weight: 800; color: var(--gold); }
.stat-label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; font-weight: 600; margin-top: 4px;}
.timer-grid-new { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 0 15px; }
@media(min-width: 600px) { .timer-grid-new { grid-template-columns: 1fr 1fr; } }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 15px; }
.cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 12px; color: var(--text-sub); background: var(--icon-bg); color: #fff; }
.cal-day.today { background: var(--accent); color: #fff; font-weight: bold; }
.cal-day.event { border: 1px solid var(--accent); color: var(--accent); }

/* Nav */
.bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-height);
    background: var(--bg-card); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; padding-top: 12px; z-index: 999;
}
.nav-btn { background: none; border: none; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; }
.nav-btn.active { color: var(--accent); }

/* Modals */
.modal-wrap { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal { background: var(--bg-card); width: 90%; max-width: 350px; border-radius: 20px; padding: 20px; border: 1px solid var(--border); color: var(--text-main); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
.theme-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; margin: 5px; transition: 0.2s; position:relative; }
.theme-btn:active { transform: scale(0.9); }

/* Helpers */
.list-container { padding: 0 15px; display: flex; flex-direction: column; gap: 8px; }
.task-top-row { display: flex; align-items: center; gap: 12px; width: 100%; }
.task-bottom-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 8px; flex-wrap: wrap; gap: 8px; }
.status-badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
.status-badge.time { color: var(--text-sub); background: var(--bar-bg); border: 1px solid var(--border); }
.status-badge.twink { color: var(--twink-text); background: var(--twink-bg); border: 1px solid var(--twink-border); }
.checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--text-sub); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 14px; background: var(--input-bg); cursor: pointer; }
.task-item.completed { opacity: 0.6; }
.btn-instant-done { height: 32px; padding: 0 10px; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); color: var(--green); border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: 800; display:flex; align-items:center; }
.it-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; padding: 0; }
.header { padding: 20px 15px 10px; font-size: 28px; font-weight: 800; color: var(--accent); }
.segment-wrapper { overflow-x: auto; padding: 0 15px 10px; margin-bottom: 5px; }
.segment { display: flex; gap: 8px; }
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); margin-top: 15px; background: var(--bg-card); }
table { width: 100%; border-collapse: collapse; min-width: 320px; font-size: 12px; }
th { background: var(--bar-bg); color: var(--accent); text-align: left; padding: 12px 10px; } td { padding: 12px 10px; border-bottom: 1px solid var(--border); color: var(--text-main); }
.tarot-grid-new { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tarot-card-new { background: var(--bar-bg); border: 1px solid var(--border); padding: 10px; border-radius: 8px; display: flex; gap: 10px; align-items:center; }
.tarot-icon-box { font-size: 24px; min-width: 30px; display:flex; justify-content:center;}
.tarot-card-title { font-weight: bold; font-size: 12px; color: var(--accent); }
.tarot-card-desc { font-size: 10px; color: var(--text-sub); margin-top: 2px; line-height: 1.2; }
.tarot-icon-img { width: 30px; height: 30px; object-fit: contain; }
</style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><div style="margin-top:10px;color:#666;font-size:12px;">Загрузка...</div></div>

<div id="tab-bp" class="tab-content active">
    <div class="bp-hero">
        <div class="hero-stats-grid">
            <div class="stat-box"><div class="stat-val" id="totalBp">0</div><div class="stat-label">BP</div></div>
            <div class="stat-box"><div class="stat-val" id="totalTime">0</div><div class="stat-label">Часы</div></div>
            <div class="stat-box"><div class="stat-val" id="multiplierDisp">x1</div><div class="stat-label">Множ.</div></div>
            <div class="stat-box"><div class="stat-val" id="doneCount">0</div><div class="stat-label">Готово</div></div>
        </div>
        <div class="hero-toggles" style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">

            <input type="number" id="startBp" value="0" oninput="updateBP()" style="width:60px; padding:4px; font-size:12px; text-align:center;">
        </div>
    </div>
    
    <div style="display: flex; gap: 8px; padding: 0 15px; margin-bottom: 15px; overflow-x: auto;">

            <option value="min">Сорт: BP (Мало)</option>
        </select>
    </div>

    <div class="sticky-search">
        <div class="mini-stats-row">
            <div class="stat-side">

                <span class="mini-stat-val" style="color:var(--gold)" id="stickyTotal">0</span>
            </div>
            
            <div class="header-timer-wrap" id="headerTimerWidget">
                <button class="ht-btn" onclick="changeHeaderTimer(-1)">◀</button>

            <div class="stat-side">
                Нафармлено
                <span class="mini-stat-val" style="color:var(--green)" id="stickyFarmed">+0</span>
            </div>
        </div>
        
        <input type="text" class="search-input" id="searchBp" placeholder="🔍 Найти задание..." oninput="renderBP()" style="width:100%; box-sizing:border-box;">

    <div class="list-container" id="listBP"></div>
</div>

    <div class="modal">

// ================= LOGIC =================
let BP = { start:0, done:[], times:{}, hidden:[], counters:{}, vip:false, x2:false, sortOrder:[] };
let TIMERS = {}; let EVENTS = []; let TIMER_INT = {};
let saveTimers = {}; let SCROLL_POS = {};

const Cloud = {
    isAvailable: () => window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.CloudStorage,
    getItem: (key) => new Promise((resolve) => {
        if (!Cloud.isAvailable()) return resolve(localStorage.getItem(key));
        const safetyTimeout = setTimeout(() => resolve(localStorage.getItem(key)), 2000);
        window.Telegram.WebApp.CloudStorage.getItem(key, (err, val) => {
            clearTimeout(safetyTimeout);
            resolve((err || !val) ? localStorage.getItem(key) : val);
        });
    }),
    setItem: (key, value) => {
        localStorage.setItem(key, value);
        if (Cloud.isAvailable()) {
            if (saveTimers[key]) clearTimeout(saveTimers[key]);
            saveTimers[key] = setTimeout(() => {
                window.Telegram.WebApp.CloudStorage.setItem(key, value, (err)=>{});
            }, 500);
        }
    }
};

async function init() {
    try {
        const [bpData, tmData, evData] = await Promise.all([
            Cloud.getItem('gta_bp_22'), Cloud.getItem('gta_tm_22'), Cloud.getItem('gta_ev_22')
        ]);
        if(bpData) BP = JSON.parse(bpData);
        if(!BP.doneTwink) BP.doneTwink = [];
        if(tmData) TIMERS = JSON.parse(tmData);
        if(evData) EVENTS = JSON.parse(evData);
    } catch (e) { console.error(e); }

    if(!BP.sortOrder || BP.sortOrder.length !== DB.bp.length) BP.sortOrder = DB.bp.map((_, i) => i);
    
    document.getElementById('loader').remove();
    const savedTheme = localStorage.getItem('gta_theme_22');
    if(savedTheme) setTheme(savedTheme);

    document.getElementById('startBp').value = BP.start || '';
    renderBP(); updateBP(); renderTimers(); renderTimerPresets(); renderCal(); renderFood();
    
    const activeGuideBtn = document.querySelector('#tab-guides .seg-btn.active');
    if(activeGuideBtn) setGuide('payment', activeGuideBtn);

    setupDragAndDrop();
}

function go(id, btn) {
    const currentTab = document.querySelector('.tab-content.active');
    if(currentTab) SCROLL_POS[currentTab.id] = window.scrollY;
    
    document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
    btn.classList.add('active');
    
    window.scrollTo(0, SCROLL_POS['tab-'+id] || 0);
}

// --- BP CORE ---
function saveBP() { Cloud.setItem('gta_bp_22', JSON.stringify(BP)); }
function toggleVip() { BP.vip = !BP.vip; updateBP(); renderBP(); }
function toggleX2() { BP.x2 = !BP.x2; updateBP(); renderBP(); }

function updateBP() {
    BP.start = parseInt(document.getElementById('startBp').value) || 0;
    let total = BP.start;
    let doneCount = BP.done.length + (BP.doneTwink ? BP.doneTwink.length : 0);
    
    BP.done.forEach(i => { let t = DB.bp[i]; if(t && !t.r) { let rw = BP.vip ? t.v : t.b; if(BP.x2) rw *= 2; total += rw; } });
    if(BP.counters) { Object.keys(BP.counters).forEach(i => { let t = DB.bp[i]; if(t && t.r) { let rw = BP.vip ? t.v : t.b; if(BP.x2) rw *= 2; total += (rw * BP.counters[i]); } }); }

    // Stats
    document.getElementById('totalBp').innerText = total;
    document.getElementById('doneCount').innerText = doneCount;
    document.getElementById('multiplierDisp').innerText = 'x' + ((BP.vip?2:1)*(BP.x2?2:1));
    document.getElementById('stickyTotal').innerText = total;
    let farmed = total - BP.start;
    document.getElementById('stickyFarmed').innerText = (farmed >= 0 ? "+" : "") + farmed;

    // Hours
    let hCount = (BP.counters && BP.counters[0]) ? BP.counters[0] : 0;
    if(hCount === 0 && BP.done.includes(0)) hCount = 1;
    const elTime = document.getElementById('totalTime');
    elTime.innerText = (hCount * 3) + 'ч';
    elTime.style.color = hCount > 0 ? "var(--gold)" : "var(--text-sub)";
    
    document.getElementById('btnVip').classList.toggle('active', BP.vip);
    document.getElementById('btnX2').classList.toggle('active', BP.x2);
    saveBP();
}

function toggleTask(i, event) {
    if(event) event.stopPropagation();
    if(BP.done.includes(i)) { 
        BP.done = BP.done.filter(x=>x!==i); delete BP.times[i]; 
        if(BP.counters && BP.counters[i]) BP.counters[i] = 0;
    } else { 
        BP.done.push(i); if(BP.doneTwink) BP.doneTwink = BP.doneTwink.filter(x => x !== i);
        BP.times[i] = new Date().toLocaleTimeString().slice(0,5); 
        if(DB.bp[i].q > 1) BP.counters[i] = DB.bp[i].q;
    }
    saveBP(); renderBP(); updateBP();
}

function toggleTwink(i, e) {
    e.stopPropagation();
    if(!BP.doneTwink) BP.doneTwink = [];
    if(BP.doneTwink.includes(i)) BP.doneTwink = BP.doneTwink.filter(x => x !== i);
    else { BP.doneTwink.push(i); BP.done = BP.done.filter(x => x !== i); }
    saveBP(); renderBP(); updateBP();
}

function updateCounter(id, delta) {
    if(!BP.counters) BP.counters = {};
    if(typeof BP.counters[id] === 'undefined') BP.counters[id] = 0;
    
    const wasDone = BP.done.includes(id);
    const max = DB.bp[id].q;
    BP.counters[id] += delta;
    if(BP.counters[id] < 0) BP.counters[id] = 0;
    
    if(!DB.bp[id].r) {
        if(BP.counters[id] > max) BP.counters[id] = max;
        if(BP.counters[id] >= max && !BP.done.includes(id)) { BP.done.push(id); BP.times[id] = new Date().toLocaleTimeString().slice(0,5); }
        else if(BP.counters[id] < max && BP.done.includes(id)) { BP.done = BP.done.filter(x=>x!==id); delete BP.times[id]; }
    }
    saveBP(); updateBP();
    
    if(wasDone !== BP.done.includes(id)) renderBP();
    else {
        const elBar = document.getElementById(`prog_${id}`);
        const elTxt = document.getElementById(`cnt_${id}`);
        if(elBar && elTxt) {
            let pct = (BP.counters[id] / max) * 100; if(pct>100) pct=100;
            elBar.style.width = pct + '%'; elTxt.innerText = BP.counters[id];
        } else renderBP();
    }
}

function completeInstant(id) {
    const max = DB.bp[id].q;
    const current = BP.counters && BP.counters[id] ? BP.counters[id] : 0;
    if (max - current > 0) updateCounter(id, max - current);
}

function hideBP(i,e) { e.stopPropagation(); BP.hidden.push(i); saveBP(); renderBP(); }
function newDay() { if(confirm("Начать новый день?")) { BP.done=[]; BP.doneTwink=[]; BP.times={}; BP.counters={}; BP.start=0; document.getElementById('startBp').value=''; saveBP(); renderBP(); updateBP(); } }

function renderBP() {
    const list = document.getElementById('listBP'); 
    const search = document.getElementById('searchBp').value.toLowerCase();
    const sortMode = document.getElementById('bpSort').value;
    if(!BP.localTimers) BP.localTimers = {};
    if(!BP.doneTwink) BP.doneTwink = [];

    let tasks = BP.sortOrder.map(id => ({...DB.bp[id], id: id}));
    if(sortMode === 'max') tasks.sort((a, b) => b.q - a.q);
    if(sortMode === 'min') tasks.sort((a, b) => a.q - b.q);

    list.innerHTML = '';
    tasks.forEach(t => {
        const i = t.id;
        if(BP.hidden.includes(i) || (search && !t.t.toLowerCase().includes(search))) return;
        
        const done = BP.done.includes(i);
        const isTwink = BP.doneTwink.includes(i);
        let rw = BP.vip ? t.v : t.b; if(BP.x2) rw *= 2;
        
        let statusHtml = done && BP.times[i] ? `<div class="status-badge time">${BP.times[i]}</div>` : (isTwink ? `<div class="status-badge twink">ТВИНК</div>` : '');
        let controlsHtml = '';
        let progressHtml = '';
        
        if(t.q > 1 || t.r) {
            const curr = BP.counters && BP.counters[i] ? BP.counters[i] : 0;
            const pct = t.q > 0 ? Math.min((curr / t.q) * 100, 100) : 0;
            if(!t.r) {
                progressHtml = `<div class="progress-track"><div id="prog_${i}" class="progress-fill" style="width: ${pct}%"></div></div>`;
            }
            controlsHtml = `
                <div class="controls-new" onclick="event.stopPropagation()">
                    <button class="btn-mini minus" onclick="updateCounter(${i}, -1)">−</button>
                    <span id="cnt_${i}" class="counter-val-new">${curr}</span>
                    <button class="btn-mini plus" onclick="updateCounter(${i}, 1)">+</button>
                </div>
                <div style="font-size:11px; font-weight:800; color:var(--green); margin-left:4px;">+${rw}</div>
                ${(!t.r && !done) ? `<button class="btn-instant-done" onclick="completeInstant(${i})">MAX</button>` : ''}
            `;
        } else {
            controlsHtml = `<div class="checkbox" onclick="toggleTask(${i}, event)">${done?'✔':''}</div><div style="font-size:11px; font-weight:800; color:var(--green); margin-left:6px;">+${rw}</div>`;
        }

        let timerHtml = '';
        if (t.timer) {
            let lt = BP.localTimers[i] || { rm: t.timer, run: false };
            if(lt.run && lt.et) { const diff = Math.ceil((lt.et - Date.now()) / 1000); lt.rm = diff > 0 ? diff : 0; if(lt.rm===0) lt.run=false; }
            timerHtml = `
            <div class="inline-timer-box" onclick="event.stopPropagation()">
                <button class="it-btn" style="${lt.run?'color:var(--gold)':''}" onclick="toggleLocalTimer(${i}, ${t.timer})">${lt.run?'⏸':'▶'}</button>
                <div class="it-val ${lt.rm<=0?'done':''}" id="loc_timer_${i}">${lt.rm<=0?"ГОТОВО":fmtTime(lt.rm)}</div>
                <button class="it-btn" onclick="resetLocalTimer(${i}, ${t.timer})">↺</button>
            </div>`;
        }

        const item = document.createElement('div');
        item.className = `task-item ${done && !t.r ? 'completed' : ''} ${isTwink ? 'twink-done' : ''}`;
        item.setAttribute('data-id', i);
        if(!t.r && t.q <= 1) item.onclick = () => toggleTask(i);
        
        // FIXED IMAGE LOGIC (Force image if text contains dot or slash)
        let icon;
        if (t.img && (t.img.includes('/') || t.img.includes('.'))) {
             icon = `<img src="${t.img}" class="bp-img">`;
        } else {
             icon = `<span class="bp-emoji">${t.i||'🔹'}</span>`;
        }
        
        const twinkBtn = !t.r ? `<button class="btn-mini" style="width:28px; height:28px; background:transparent; border:1px solid #333; color:#888;" onclick="toggleTwink(${i}, event)">👻</button>` : '';

        item.innerHTML = `
            <div class="task-top-row">
                <div class="drag-handle" style="color:#444;">⋮⋮</div>
                <div class="bp-icon-container">${icon}</div>
                <div style="flex:1; min-width:0;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:14px; font-weight:700; color:var(--text-main);">${t.t} ${t.r?'<span style="font-size:10px; opacity:0.5">∞</span>':''}</div>
                        ${statusHtml}
                    </div>
                    ${progressHtml}
                </div>
            </div>
            <div class="task-bottom-row">
                 <div style="display:flex;">${timerHtml}</div>
                 <div class="task-actions-group">
                    ${controlsHtml}
                    ${twinkBtn}
                    <button class="btn-mini del" style="width:28px; height:28px; border:1px solid #333; background:transparent; color:#666;" onclick="hideBP(${i},event)">✕</button>
                 </div>
            </div>
        `;
        list.appendChild(item);
    });
}

// --- TIMERS ---
function saveTm() { Cloud.setItem('gta_tm_22', JSON.stringify(TIMERS)); }
function fmtTime(s) { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60; return (h>0?h+':':'')+pad(m)+':'+pad(sc); }
function pad(n) { return n<10?'0'+n:n; }

function renderTimers() {
    const list = document.getElementById('activeTimersList');
    list.innerHTML = '';
    const all = TIMERS.custom || [];
    if(all.length === 0) list.innerHTML = '<div style="color:var(--text-sub); font-size:13px;">Нет активных таймеров</div>';

    all.forEach(t => {
        if(t.run) {
            const now = Date.now();
            if(t.et) t.rm = Math.ceil((t.et - now)/1000);
            else t.et = now + (t.rm*1000);
            if(t.rm <= 0) { t.rm = 0; t.run = false; }
        }
        
        const pct = t.s > 0 ? (t.rm / t.s)*100 : 0;
        list.innerHTML += `
            <div class="timer-card ${t.run?'running':''}">
                <div style="display:flex; justify-content:space-between;">
                    <div style="font-weight:700; color:var(--text-sub);">${t.l}</div>
                    <div style="font-size:10px; color:var(--gold); opacity:${t.run?1:0}">АКТИВЕН</div>
                </div>
                <div class="tc-time" id="disp_${t.id}">${fmtTime(t.rm)}</div>
                <div class="timer-progress-bg"><div id="prog_bar_${t.id}" class="timer-progress-bar" style="width:${pct}%"></div></div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button onclick="togTime('${t.id}')" style="flex:1; background:${t.run?'var(--red)':'var(--green)'}; border:none; border-radius:8px; color:#fff; font-weight:bold; height:36px;">${t.run?'СТОП':'СТАРТ'}</button>
                    <button onclick="rstTime('${t.id}')" style="width:36px; background:#222; border:1px solid #333; color:#fff; border-radius:8px;">↺</button>
                    <button onclick="delTime('${t.id}')" style="width:36px; background:#222; border:1px solid #333; color:#888; border-radius:8px;">✕</button>
                </div>
            </div>`;
    });
    // Interval updates DOM directly
    saveTm();
}

setInterval(() => {
    let ch = false;
    const now = Date.now();
    if(TIMERS.custom) {
        TIMERS.custom.forEach(t => {
            if(t.run) {
                if(!t.et) t.et = now + (t.rm * 1000);
                const diff = Math.ceil((t.et - now) / 1000);
                if (diff <= 0) {
                    t.rm = 0; t.run = false; renderTimers();
                    if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                        window.Telegram.WebApp.showPopup({title:'Таймер!', message: t.l});
                    }
                } else {
                    t.rm = diff;
                }
                const elDisp = document.getElementById(`disp_${t.id}`);
                const elBar = document.getElementById(`prog_bar_${t.id}`);
                if(elDisp) elDisp.innerText = fmtTime(t.rm);
                if(elBar) {
                    const pct = t.s > 0 ? (t.rm / t.s)*100 : 0;
                    elBar.style.width = pct + "%";
                }
                ch = true;
            }
        });
    }
    if(ch && now % 5000 < 1000) saveTm();
}, 1000);

function renderTimerPresets() {
    const c = document.getElementById('timerGrid'); c.innerHTML = '';
    DB.timers.forEach(t => {
        // FIXED IMAGE LOGIC (Bug fix for showing text instead of image)
        let icon;
        if (t.i && (t.i.includes('/') || t.i.includes('.'))) {
             icon = `<img src="${t.i}" style="width:24px;height:24px;object-fit:contain">`;
        } else {
             icon = `<div style="font-size:24px;">${t.i||'⏱'}</div>`;
        }
        
        c.innerHTML += `<div class="timer-card" onclick="addGameTimer('${t.id}')" style="cursor:pointer; align-items:center; flex-direction:row;">
            ${icon}
            <div style="flex:1;"><div style="font-weight:bold; color:var(--text-main);">${t.l}</div><div style="color:var(--text-sub); font-size:12px;">${fmtTimeSimple(t.s)}</div></div>
            <div style="font-size:20px; color:var(--accent);">+</div>
        </div>`;
    });
}
function fmtTimeSimple(s) { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60); return h>0 ? h+'ч '+m+'м' : m+' мин'; }

function addTimerRaw(min, label) {
    if(!TIMERS.custom) TIMERS.custom = [];
    const dur = min*60;
    TIMERS.custom.push({ id:'t_'+Date.now(), l:label, s:dur, rm:dur, run:true, ts:Date.now(), et:Date.now()+(dur*1000) });
    saveTm(); renderTimers();
}
function addCustomTimer() { const m=parseInt(document.getElementById('customMin').value), n=document.getElementById('customName').value; if(m) { addTimerRaw(m, n||(m+' мин')); document.getElementById('customMin').value=''; } }
function addGameTimer(id) { const t=DB.timers.find(x=>x.id===id); if(t) addTimerRaw(t.s/60, t.l); }
function togTime(id) { 
    const t = TIMERS.custom.find(x => x.id === id);
    if(t) { 
        // Bug fix: If time is 0, reset AND start immediately
        if(t.rm <= 0) { t.rm = t.s; t.run = false; }
        t.run = !t.run; 
        if(t.run) { t.et = Date.now() + (t.rm * 1000); } else { delete t.et; }
        if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }
        saveTm(); 
        renderTimers(); 
    }
}
function rstTime(id) { const t=TIMERS.custom.find(x=>x.id===id); if(t) { t.rm=t.s; t.run=false; delete t.et; saveTm(); renderTimers(); } }
function delTime(id) { TIMERS.custom=TIMERS.custom.filter(t=>t.id!==id); saveTm(); renderTimers(); }

// --- HEADER TIMER & LOCAL TIMER FIX ---
let headTimerIdx = 0;
setInterval(() => {
    const active = TIMERS.custom ? TIMERS.custom.filter(t=>t.run) : [];
    const elLab = document.getElementById('htLabel'), elTime = document.getElementById('htTime'), elBar = document.getElementById('htProgressBar');
    if(active.length === 0) { elLab.innerText="Нет активных"; elTime.innerText="--:--"; elBar.style.width="0%"; return; }
    if(headTimerIdx >= active.length) headTimerIdx=0;
    const t = active[headTimerIdx];
    let now=Date.now(), rm=0;
    if(t.et) rm = Math.ceil((t.et-now)/1000); else rm=t.rm;
    elLab.innerText = t.l; elTime.innerText = fmtTime(rm>0?rm:0); elTime.style.color = "var(--text-main)";
    elBar.style.width = t.s>0 ? Math.min((rm/t.s)*100, 100) + "%" : "0%";
}, 1000);
function changeHeaderTimer(d) { headTimerIdx+=d; }

function toggleLocalTimer(id, def) {
    if(!BP.localTimers) BP.localTimers={};
    let t = BP.localTimers[id];
    if(!t) BP.localTimers[id] = t = { rm:def, run:false };
    
    // Bug fix: Logic for mini-timers inside tasks
    if(t.rm <= 0) {
        t.rm = def; // Reset
        t.run = true; // Auto-start!
        t.et = Date.now() + (t.rm * 1000);
    } else {
        t.run = !t.run;
        if(t.run) t.et = Date.now() + (t.rm * 1000); else delete t.et;
    }
    saveBP(); renderBP();
}
function resetLocalTimer(id, def) { if(BP.localTimers && BP.localTimers[id]) { BP.localTimers[id].rm=def; BP.localTimers[id].run=false; delete BP.localTimers[id].et; saveBP(); renderBP(); } }
setInterval(() => {
    if(!BP.localTimers) return;
    let ch = false; const now=Date.now();
    for(const k in BP.localTimers) {
        let t = BP.localTimers[k];
        if(t.run) {
            let df = Math.ceil((t.et - now)/1000);
            if(df<=0) { t.rm=0; t.run=false; renderBP(); } else { t.rm=df; const el=document.getElementById('loc_timer_'+k); if(el) el.innerText=fmtTime(df); }
            ch=true;
        }
    }
    if(ch && now%5000<1000) saveBP();
}, 1000);

// --- THEME & UNHIDE ---
function openThemeModal() { document.getElementById('modalTheme').style.display = 'flex'; }
function closeThemeModal(e) { if(e.target.id === 'modalTheme') document.getElementById('modalTheme').style.display = 'none'; }
function setTheme(n) {
    document.body.className = ''; if(n!=='default') document.body.classList.add(n);
    localStorage.setItem('gta_theme_22', n); closeThemeModal({target:{id:'modalTheme'}});
}
function openUnhideModal() {
    const l = document.getElementById('unhideList'); l.innerHTML = BP.hidden.length ? '' : '<div style="padding:20px; text-align:center; color:var(--text-sub);">Пусто</div>';
    BP.hidden.forEach(id => {
        let t = DB.bp[id]; if(t) l.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border); color:var(--text-main);"><span>${t.t}</span><button onclick="restoreTask(${id})" style="background:var(--accent); border:none; color:white; padding:4px 10px; border-radius:4px;">Вернуть</button></div>`;
    });
    document.getElementById('modalUnhide').style.display='flex';
}
function restoreTask(id) { BP.hidden=BP.hidden.filter(x=>x!==id); saveBP(); renderBP(); openUnhideModal(); }
function forceSync() { location.reload(); }
function setupDragAndDrop() {
    Sortable.create(document.getElementById('listBP'), { handle:'.drag-handle', animation:150, onEnd: function() {
        const ord=[]; document.querySelectorAll('#listBP .task-item').forEach(el=>ord.push(parseInt(el.getAttribute('data-id'))));
        BP.sortOrder = [...ord, ...BP.sortOrder.filter(id=>!ord.includes(id))]; saveBP();
    }});
}

if(window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
init();
</script>
